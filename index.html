<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUTHORIZATION | LNX</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #020202;
      color: #00ff66;
      font-family: "Courier New", monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        transparent,
        transparent 2px,
        rgba(0,255,80,0.04) 3px
      );
      pointer-events: none;
      z-index: 1;
    }

    .container {
      width: 90%;
      max-width: 850px;
      text-align: center;
      padding: 40px;
      border: 1px solid rgba(0,255,100,0.3);
      background: rgba(0, 0, 0, 0.88);
      box-shadow: 0 0 60px rgba(0,255,80,0.12);
      border-radius: 12px;
      backdrop-filter: blur(4px);
      z-index: 2;
      animation: fadeIn 1.2s ease;
    }

    h1 {
      font-size: 56px;
      color: #00ff66;
      text-shadow: 0 0 15px rgba(0,255,80,0.6);
      letter-spacing: 6px;
      margin-bottom: 10px;
    }

    .lnx {
      font-size: 20px;
      color: #00ff99;
      letter-spacing: 10px;
      margin-bottom: 30px;
    }

    .warning {
      font-size: 26px;
      color: #00ff88;
      margin-bottom: 18px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(0,255,80,0.3);
    }

    .text {
      font-size: 18px;
      color: #b7ffd1;
      line-height: 1.9;
    }

    .line {
      margin: 30px auto;
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, #00ff66, transparent);
      box-shadow: 0 0 12px rgba(0,255,80,0.4);
    }

    /* NEW BUTTON STYLE */
    .access-btn {
      margin-top: 20px;
      padding: 12px 24px;
      background: transparent;
      border: 1px solid #00ff66;
      color: #00ff66;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 2px;
      transition: 0.3s;
      box-shadow: 0 0 15px rgba(0,255,80,0.2);
    }

    .access-btn:hover {
      background: #00ff66;
      color: black;
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0,255,80,0.6);
    }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.4; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>AUTHORIZATION</h1>

    <div class="lnx">LNX</div>

    <div class="warning blink">
      UNABLE TO ACCESS THAT AREA
    </div>

    <div class="text">
      This base can only be managed by the <strong>ADMINISTRATOR</strong>
    </div>

    <div class="line"></div>

    <div class="text">
      ACCESS DENIED — SECURITY LAYER ACTIVE
    </div>

    <!-- ✅ NEW BUTTON ADDED HERE -->
    <a href="https://thespicyclips.github.io/system-control-panel/">
    <button class="access-btn" onclick="window.location.href='index.html'">
      ACCESS LOGIN
    </button>

    <!-- ✅ NEW BUTTON2 ADDED HERE -->
    <a href="https://thespicyclips.github.io/move-green-area/">
    <button class="access-btn" onclick="window.location.href='index.html'">
      MOVE TO GREENAREA
    </button>

  </div>

</body>
</html>
